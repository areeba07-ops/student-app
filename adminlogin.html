<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00f5d4;--teal2:#00c9a7;--pink:#f72585;
  --purple:#7209b7;--blue:#4361ee;--navy:#0d1b2a;
  --card:rgba(13,27,42,0.6);--text:#fff;
  --sub:rgba(255,255,255,0.55);
  --input-bg:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.13);
}
body.light{
  --navy:#f0f4ff;--card:rgba(255,255,255,0.78);
  --text:#0d1b2a;--sub:rgba(13,27,42,0.5);
  --input-bg:rgba(13,27,42,0.06);--border:rgba(13,27,42,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Outfit",sans-serif;}
body{
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  overflow:hidden;color:var(--text);transition:color .3s;
}
.bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0d1b2a,#1a0533,#0a2a4a,#003d3b,#1a0533,#0d1b2a);
  background-size:400% 400%;
  animation:gradShift 12s ease infinite;
}
body.light .bg{
  background:linear-gradient(135deg,#e0f7fa,#e8eaf6,#e0f2fe,#f3e5f5,#e8eaf6,#e0f7fa);
  background-size:400% 400%;
}
@keyframes gradShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.orb{
  position:fixed;border-radius:50%;filter:blur(90px);
  opacity:.4;pointer-events:none;z-index:0;
  animation:orbFloat 20s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#7209b7,transparent);top:-150px;left:-150px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#4361ee,transparent);bottom:-100px;right:-100px;animation-delay:-7s;}
.orb3{width:350px;height:350px;background:radial-gradient(circle,#00c9a7,transparent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-14s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-30px) scale(1.08);}
  66%{transform:translate(-30px,40px) scale(0.95);}
}
.wrap{position:relative;z-index:1;width:420px;padding:42px 38px;
  background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:24px;border:1px solid var(--border);
  box-shadow:0 30px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);
  animation:cardIn .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}
.top-bar{display:flex;justify-content:space-between;margin-bottom:28px;}
.link-btn{background:none;border:none;cursor:pointer;color:var(--teal);font-size:13px;font-family:"Outfit",sans-serif;
  padding:6px 10px;border-radius:8px;transition:background .2s;}
.link-btn:hover{background:rgba(0,245,212,.1);}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{
  width:62px;height:62px;border-radius:18px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--teal2),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 8px 24px rgba(0,201,167,.35);
}
.logo h2{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.logo p{font-size:13px;color:var(--sub);margin-top:4px;}
.field{margin-bottom:18px;position:relative;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--sub);margin-bottom:7px;}
.field input{
  width:100%;padding:13px 16px;border-radius:12px;
  border:1px solid var(--border);outline:none;
  background:var(--input-bg);color:var(--text);font-size:14px;font-family:"Outfit",sans-serif;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,245,212,.15);}
.eye{position:absolute;right:14px;bottom:13px;cursor:pointer;
  font-size:12px;color:var(--sub);background:rgba(255,255,255,0.08);
  padding:3px 8px;border-radius:6px;user-select:none;transition:background .2s;}
.eye:hover{background:rgba(255,255,255,0.15);}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);margin-bottom:20px;}
.remember input{accent-color:var(--teal);width:15px;height:15px;}
.btn{
  width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;
  font-size:15px;font-weight:700;font-family:"Outfit",sans-serif;
  background:linear-gradient(135deg,var(--teal2),var(--blue));
  color:#fff;letter-spacing:.3px;
  box-shadow:0 6px 20px rgba(67,97,238,.4);
  transition:opacity .2s,transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.btn::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .2s;}
.btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 10px 28px rgba(67,97,238,.5);}
.btn:hover::after{opacity:1;}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.err{margin-top:14px;font-size:13px;color:#ff6b6b;text-align:center;}
.att{margin-top:6px;font-size:12px;color:var(--sub);text-align:center;}
#toast{
  position:fixed;top:24px;right:24px;padding:13px 20px;border-radius:12px;
  font-size:14px;font-weight:600;opacity:0;transition:.35s;z-index:999;
  backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);
}
#toast.show{opacity:1;}
#toast.success{background:rgba(0,201,167,.9);color:#fff;}
#toast.error{background:rgba(220,38,38,.85);color:#fff;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div id="toast"></div>

<div class="wrap">
  <div class="top-bar">
    <button class="link-btn" onclick="toggleTheme()">🌗 Theme</button>
    <button class="link-btn" onclick="forgotPassword()">Forgot?</button>
  </div>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h2>Admin Login</h2>
    <p>University Management System</p>
  </div>
  <div class="field">
    <label>Username</label>
    <input id="username" placeholder="Enter username" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <span class="eye" onclick="togglePassword()">Show</span>
  </div>
  <label class="remember"><input type="checkbox" id="remember"> Remember Me</label>
  <button class="btn" id="btn" onclick="login()">Login</button>
  <div class="err" id="error"></div>
  <div class="att" id="attempts"></div>
</div>

<script>
if(localStorage.getItem("token")||sessionStorage.getItem("token"))window.location.href="/index.html";
let cooldown=false,attempts=0;
function toggleTheme(){document.body.classList.toggle("light");}
function togglePassword(){
  const p=document.getElementById("password"),e=document.querySelector(".eye");
  p.type=p.type==="password"?"text":"password";e.innerText=p.type==="password"?"Show":"Hide";
}
function forgotPassword(){showToast("Contact admin to reset password","error");}
function showToast(msg,type="error"){
  const t=document.getElementById("toast");t.innerText=msg;t.className="";
  t.classList.add("show",type);clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),3000);
}
function startCooldown(s){
  const btn=document.getElementById("btn"),err=document.getElementById("error");
  cooldown=true;btn.disabled=true;let r=s;err.innerText=`Retry in ${r}s`;
  const iv=setInterval(()=>{r--;if(r>0){err.innerText=`Retry in ${r}s`;}else{clearInterval(iv);btn.disabled=false;cooldown=false;err.innerText="";}},1000);
}
function login(){
  if(cooldown)return;
  const u=document.getElementById("username").value.trim(),p=document.getElementById("password").value.trim(),r=document.getElementById("remember").checked;
  if(!u||!p){showToast("Fill all fields","error");return;}
  const btn=document.getElementById("btn");btn.innerText="Logging in…";btn.disabled=true;
  fetch("https://student-nmr4qaetu-areeba07-ops-projects.vercel.app:3000/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})})
  .then(r=>r.json()).then(data=>{
    btn.innerText="Login";btn.disabled=false;
    if(data.success){
      attempts=0;document.getElementById("attempts").innerText="";
      r?localStorage.setItem("token",data.token):sessionStorage.setItem("token",data.token);
      if(r)sessionStorage.removeItem("token");else localStorage.removeItem("token");
      showToast("Login successful","success");setTimeout(()=>window.location.href="/index.html",500);
    }else{
      attempts++;document.getElementById("attempts").innerText=`Attempts: ${attempts}`;
      showToast(data.message||"Invalid credentials","error");if(attempts>=3)startCooldown(5);
    }
  }).catch(()=>{btn.innerText="Login";btn.disabled=false;showToast("Server error","error");});
}
</script>
</body>
</html>
