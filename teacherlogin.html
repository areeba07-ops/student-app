<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00f5d4;--teal2:#00c9a7;--orange:#ff6b35;
  --purple:#7209b7;--blue:#4361ee;
  --card:rgba(13,27,42,0.6);--text:#fff;
  --sub:rgba(255,255,255,0.55);
  --input-bg:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.13);
}
body.light{
  --card:rgba(255,255,255,0.78);--text:#0d1b2a;
  --sub:rgba(13,27,42,0.5);--input-bg:rgba(13,27,42,0.06);--border:rgba(13,27,42,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Outfit",sans-serif;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;color:var(--text);transition:color .3s;}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0d1b2a,#1a0533,#2a0a00,#003d3b,#0d1b2a);background-size:400% 400%;animation:gradShift 12s ease infinite;}
body.light .bg{background:linear-gradient(135deg,#fff3e0,#fce4ec,#e8eaf6,#e0f7fa,#fff3e0);background-size:400% 400%;}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.38;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite;}
.orb1{width:480px;height:480px;background:radial-gradient(circle,#ff6b35,transparent);top:-120px;left:-80px;animation-delay:0s;}
.orb2{width:380px;height:380px;background:radial-gradient(circle,#7209b7,transparent);bottom:-80px;right:-80px;animation-delay:-8s;}
.orb3{width:320px;height:320px;background:radial-gradient(circle,#00c9a7,transparent);top:55%;left:55%;transform:translate(-50%,-50%);animation-delay:-15s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(35px,-25px) scale(1.06);}66%{transform:translate(-25px,35px) scale(0.96);}}
.wrap{position:relative;z-index:1;width:430px;max-height:92vh;overflow-y:auto;padding:38px 36px;background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:24px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);animation:cardIn .7s cubic-bezier(.22,1,.36,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}
.top-bar{display:flex;justify-content:space-between;margin-bottom:24px;}
.link-btn{background:none;border:none;cursor:pointer;color:var(--teal);font-size:13px;font-family:"Outfit",sans-serif;padding:6px 10px;border-radius:8px;transition:background .2s;}
.link-btn:hover{background:rgba(0,245,212,.1);}
.logo{text-align:center;margin-bottom:24px;}
.logo-icon{width:58px;height:58px;border-radius:16px;margin:0 auto 10px;background:linear-gradient(135deg,#ff6b35,var(--purple));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(255,107,53,.35);}
.logo h2{font-size:21px;font-weight:700;}
.logo p{font-size:12px;color:var(--sub);margin-top:3px;}
.tabs{display:flex;border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:24px;}
.tab{flex:1;padding:11px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:"Outfit",sans-serif;background:transparent;color:var(--sub);transition:all .2s;}
.tab.active{background:linear-gradient(135deg,#ff6b35,var(--purple));color:#fff;}
.panel{display:none;}
.panel.active{display:block;}
.field{margin-bottom:16px;position:relative;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);outline:none;background:var(--input-bg);color:var(--text);font-size:14px;font-family:"Outfit",sans-serif;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,245,212,.15);}
.field input::placeholder{color:var(--sub);}
.eye{position:absolute;right:13px;bottom:12px;cursor:pointer;font-size:11px;color:var(--sub);background:rgba(255,255,255,0.08);padding:3px 8px;border-radius:6px;user-select:none;}
.info-box{background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--sub);margin-bottom:16px;line-height:1.6;}
.divider{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--sub);margin:4px 0 14px;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border);}
.extras{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:var(--sub);}
.remember{display:flex;align-items:center;gap:7px;}
.remember input{accent-color:var(--teal);}
.btn{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:"Outfit",sans-serif;background:linear-gradient(135deg,#ff6b35,var(--purple));color:#fff;box-shadow:0 6px 20px rgba(255,107,53,.4);transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.msg{margin-top:10px;font-size:13px;text-align:center;}
.msg.err{color:#ff6b6b;}
.msg.ok{color:#4ade80;}
#attempts{margin-top:6px;font-size:12px;color:var(--sub);text-align:center;}
#toast{position:fixed;top:24px;right:24px;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:.35s;z-index:999;backdrop-filter:blur(12px);}
#toast.show{opacity:1;}
#toast.success{background:rgba(0,201,167,.9);color:#fff;}
#toast.error{background:rgba(220,38,38,.85);color:#fff;}
#toast.warn{background:rgba(217,119,6,.9);color:#fff;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div id="toast"></div>

<div class="wrap">
  <div class="top-bar">
    <button class="link-btn" onclick="toggleTheme()">🌓 Theme</button>
    <button class="link-btn" onclick="forgotPassword()">Forgot Password?</button>
  </div>
  <div class="logo">
    <div class="logo-icon">👨‍🏫</div>
    <h2>Teacher Portal</h2>
    <p>University Management System</p>
  </div>
  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
    <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div class="panel active" id="loginPanel">
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Enter your username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
      <span class="eye" onclick="togglePass('loginPassword',this)">Show</span>
    </div>
    <div class="extras">
      <label class="remember"><input type="checkbox" id="rememberMe"> Remember Me</label>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Login</button>
    <div class="msg" id="loginMsg"></div>
    <div id="attempts"></div>
  </div>

  <div class="panel" id="signupPanel">
    <div class="info-box">Your email must be registered by admin first. After signing up, use your <strong>username</strong> to login.</div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your full name">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="Admin-registered email">
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="signupUsername" placeholder="Choose a username">
    </div>
    <div class="divider">Password</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 6 characters">
      <span class="eye" onclick="togglePass('signupPassword',this)">Show</span>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="signupConfirm" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doSignup()">
      <span class="eye" onclick="togglePass('signupConfirm',this)">Show</span>
    </div>
    <button class="btn" id="signupBtn" onclick="doSignup()">Create Account</button>
    <div class="msg" id="signupMsg"></div>
  </div>
</div>

<script>
const BASE="http://localhost:3000";
const TAPI=BASE+"/teachers";
const REG_API=BASE+"/teacher-register";
const LOGIN_API=BASE+"/teacher-login";
try{if(localStorage.getItem("teacherToken")||sessionStorage.getItem("teacherToken"))window.location.href="/teacher-dashboard.html";}catch(e){}
let loginCooldown=false,loginAttempts=0;
function qs(id){return document.getElementById(id);}
function showToast(msg,type="error"){const t=qs("toast");t.textContent=msg;t.className="";t.classList.add("show",type);clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),3200);}
function setMsg(id,msg,type="err"){const el=qs(id);el.textContent=msg;el.className="msg "+type;}
function clearMsg(id){qs(id).textContent="";qs(id).className="msg";}
function togglePass(inputId,btn){const inp=qs(inputId);inp.type=inp.type==="password"?"text":"password";btn.textContent=inp.type==="password"?"Show":"Hide";}
function toggleTheme(){document.body.classList.toggle("light");}
function forgotPassword(){showToast("Contact your admin to reset your password.","warn");}
function switchTab(tab){
  qs("loginPanel").classList.toggle("active",tab==="login");
  qs("signupPanel").classList.toggle("active",tab==="signup");
  qs("loginTab").classList.toggle("active",tab==="login");
  qs("signupTab").classList.toggle("active",tab==="signup");
  clearMsg("loginMsg");clearMsg("signupMsg");
}
function startCooldown(seconds){
  loginCooldown=true;const btn=qs("loginBtn");btn.disabled=true;let rem=seconds;
  setMsg("loginMsg","Too many attempts. Retry in "+rem+"s","err");
  const iv=setInterval(()=>{rem--;if(rem>0){setMsg("loginMsg","Too many attempts. Retry in "+rem+"s","err");}else{clearInterval(iv);loginCooldown=false;btn.disabled=false;clearMsg("loginMsg");qs("attempts").textContent="";loginAttempts=0;}},1000);
}
function doLogin(){
  if(loginCooldown)return;
  const username=qs("loginUsername").value.trim(),password=qs("loginPassword").value.trim(),remember=qs("rememberMe").checked;
  if(!username||!password){showToast("Enter username and password","error");return;}
  const btn=qs("loginBtn");btn.textContent="Logging in…";btn.disabled=true;clearMsg("loginMsg");
  fetch(LOGIN_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})})
  .then(r=>r.json()).then(data=>{
    btn.textContent="Login";btn.disabled=false;
    if(data.success){
      loginAttempts=0;
      const store=remember?localStorage:sessionStorage,other=remember?sessionStorage:localStorage;
      store.setItem("teacherToken",data.token);other.removeItem("teacherToken");
      if(data.teacher)store.setItem("teacherInfo",JSON.stringify(data.teacher));
      showToast("Login successful!","success");
      setTimeout(()=>window.location.href="/teacher-dashboard.html",500);
    }else{
      loginAttempts++;qs("attempts").textContent="Attempts: "+loginAttempts;
      setMsg("loginMsg",data.message||"Invalid credentials","err");
      if(loginAttempts>=5)startCooldown(30);
    }
  }).catch(()=>{btn.textContent="Login";btn.disabled=false;showToast("Server error. Is the server running?","error");});
}
function doSignup(){
  const name=qs("signupName").value.trim(),email=qs("signupEmail").value.trim().toLowerCase(),username=qs("signupUsername").value.trim().toLowerCase(),password=qs("signupPassword").value.trim(),confirm=qs("signupConfirm").value.trim();
  clearMsg("signupMsg");
  if(!name||!email||!username||!password||!confirm){showToast("Fill all fields","error");return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setMsg("signupMsg","Enter a valid email address.","err");return;}
  if(username.length<3){setMsg("signupMsg","Username must be at least 3 characters.","err");return;}
  if(/\s/.test(username)){setMsg("signupMsg","Username cannot contain spaces.","err");return;}
  if(password.length<6){setMsg("signupMsg","Password must be at least 6 characters.","err");return;}
  if(password!==confirm){setMsg("signupMsg","Passwords do not match.","err");return;}
  const btn=qs("signupBtn");btn.textContent="Checking approval…";btn.disabled=true;
  fetch(TAPI).then(r=>r.json()).then(teachers=>{
    if(!Array.isArray(teachers))throw new Error("Unexpected server response.");
    const approved=teachers.find(t=>(t.email||"").toLowerCase()===email);
    if(!approved){btn.textContent="Create Account";btn.disabled=false;setMsg("signupMsg","Your email is not registered by admin.","err");showToast("Email not approved by admin.","error");return;}
    btn.textContent="Creating account…";
    return fetch(REG_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,email,username,password,teacherId:approved.id})})
    .then(r=>r.json()).then(data=>{
      btn.textContent="Create Account";btn.disabled=false;
      if(data.success){
        showToast("Account created! Login with your username.","success");
        setMsg("signupMsg","Account created! Login with username: "+username,"ok");
        qs("signupName").value="";qs("signupEmail").value="";qs("signupUsername").value="";qs("signupPassword").value="";qs("signupConfirm").value="";
        setTimeout(()=>switchTab("login"),2000);
      }else{setMsg("signupMsg",data.message||"Registration failed. Try again.","err");}
    });
  }).catch(err=>{qs("signupBtn").textContent="Create Account";qs("signupBtn").disabled=false;setMsg("signupMsg",err.message||"Server error. Please try again.","err");showToast("Server error.","error");});
}
</script>
</body>
</html>
